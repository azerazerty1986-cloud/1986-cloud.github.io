<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نكهة وجمال | ناردو برو - المتجر الذكي</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #1a2f28;
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* شاشة التحميل */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a2f28;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader-spinner {
            width: 80px;
            height: 80px;
            border: 5px solid #ffd700;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* الإشعارات */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: #0a1a15;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 10px;
            color: white;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* سلة التسوق */
        .cart-sidebar {
            position: fixed;
            top: 0;
            left: -400px;
            width: 400px;
            height: 100vh;
            background: #0a1a15;
            border-left: 2px solid #ffd700;
            transition: left 0.3s;
            padding: 20px;
            z-index: 2000;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            left: 0;
        }

        /* الهيدر */
        .header {
            background: #0a1a15;
            padding: 20px 0;
            border-bottom: 2px solid #ffd700;
            margin-bottom: 20px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: #ffd700;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 30px;
            color: #1a2f28;
        }

        .logo h1 {
            color: #ffd700;
            font-size: 28px;
        }

        /* البحث */
        .search-box {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            overflow: hidden;
            width: 300px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-box button {
            padding: 0 20px;
            background: #ffd700;
            border: none;
            cursor: pointer;
            color: #1a2f28;
            font-size: 18px;
        }

        /* الأزرار */
        .action-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid #ffd700;
            color: #ffd700;
            cursor: pointer;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ffd700;
            color: #1a2f28;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* القائمة */
        .nav-menu {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .nav-link {
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-link.active {
            background: #ffd700;
            color: #1a2f28;
        }

        /* المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin: 30px 0;
        }

        @media (max-width: 992px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        .product-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.2);
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-price {
            color: #ffd700;
            font-size: 24px;
            font-weight: 800;
            margin: 10px 0;
        }

        .product-stock {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            margin: 10px 0;
        }

        .in-stock {
            background: rgba(76,175,80,0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .low-stock {
            background: rgba(255,152,0,0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .out-of-stock {
            background: rgba(244,67,54,0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .add-to-cart {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            border: none;
            border-radius: 25px;
            color: #1a2f28;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-to-cart:hover:not(:disabled) {
            background: #ffed4a;
            transform: scale(1.02);
        }

        .add-to-cart:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* الوقت */
        .time-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }

        /* النوافذ المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-content {
            background: #1a2f28;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid #ffd700;
        }

        /* الفورم */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #ffd700;
            border-radius: 15px;
            color: white;
            font-size: 15px;
        }

        .form-control:focus {
            outline: none;
            border-color: #ffed4a;
        }

        /* رفع الصور */
        .upload-area {
            border: 2px dashed #ffd700;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
        }

        .upload-area i {
            font-size: 48px;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .image-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 2px solid #ffd700;
            border-radius: 10px;
        }

        /* الأزرار */
        .btn-gold {
            background: #ffd700;
            color: #1a2f28;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-gold:hover {
            background: #ffed4a;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }

        /* أيقونة السلة الثابتة */
        .fixed-cart {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
        }

        .fixed-cart i {
            font-size: 24px;
            color: #1a2f28;
        }

        .fixed-cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* الفوتر */
        .footer {
            background: #0a1a15;
            padding: 40px 0 20px;
            margin-top: 60px;
            border-top: 2px solid #ffd700;
        }
    </style>
</head>
<body>
    <!-- شاشة التحميل -->
    <div class="loader" id="loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- الإشعارات -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- سلة التسوق -->
    <div class="cart-sidebar" id="cartSidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffd700; padding-bottom: 15px; margin-bottom: 15px;">
            <h3 style="color: #ffd700;"><i class="fas fa-shopping-cart"></i> سلة التسوق</h3>
            <i class="fas fa-times" onclick="toggleCart()" style="color: #ffd700; font-size: 24px; cursor: pointer;"></i>
        </div>
        <div id="cartItems" style="flex: 1; overflow-y: auto; margin-bottom: 15px;"></div>
        <div style="border-top: 2px solid #ffd700; padding-top: 15px;">
            <div style="display: flex; justify-content: space-between; color: #ffd700; font-size: 20px; margin-bottom: 15px;">
                <span>المجموع:</span>
                <span id="cartTotal">0 دج</span>
            </div>
            <button class="btn-gold" onclick="checkoutCart()" style="width: 100%; padding: 15px;">
                <i class="fab fa-whatsapp"></i> إتمام الطلب
            </button>
        </div>
    </div>

    <!-- الهيدر -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <div>
                    <h1>نكهة وجمال</h1>
                    <span style="color: rgba(255,255,255,0.7);">ناردو برو</span>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج..." onkeyup="searchProducts()">
                <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="action-btn" onclick="openLoginModal()" id="userBtn">
                    <i class="far fa-user"></i>
                </button>
                <button class="action-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCounter">0</span>
                </button>
                <button class="action-btn" id="dashboardBtn" onclick="openDashboard()" style="display: none;">
                    <i class="fas fa-chart-line"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- القائمة -->
    <div class="container">
        <nav class="nav-menu" id="mainNav">
            <a class="nav-link active" onclick="filterProducts('all')">الرئيسية</a>
            <a class="nav-link" onclick="filterProducts('promo')">برموسيو</a>
            <a class="nav-link" onclick="filterProducts('spices')">توابل</a>
            <a class="nav-link" onclick="filterProducts('cosmetic')">كوسمتيك</a>
            <a class="nav-link" onclick="filterProducts('other')">منتوجات أخرى</a>
        </nav>
    </div>

    <!-- الفرز -->
    <div class="container">
        <select id="sortSelect" onchange="changeSort(this.value)" style="padding: 10px 20px; background: rgba(255,255,255,0.1); border: 2px solid #ffd700; border-radius: 30px; color: white; margin: 20px 0;">
            <option value="newest">🆕 الأحدث</option>
            <option value="price_low">💰 الأقل سعراً</option>
            <option value="price_high">💰 الأعلى سعراً</option>
            <option value="rating">⭐ التقييم</option>
        </select>
    </div>

    <!-- لوحة التاجر -->
    <div class="container" id="merchantPanelContainer" style="display: none;"></div>

    <!-- المنتجات -->
    <div class="container">
        <div class="products-grid" id="productsContainer"></div>
    </div>

    <!-- لوحة التحكم -->
    <div class="container" id="dashboardSection" style="display: none; margin: 40px 0;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <button class="dashboard-tab" onclick="switchDashboardTab('overview')" style="padding: 10px 20px; background: #ffd700; color: #1a2f28; border: none; border-radius: 30px;">نظرة عامة</button>
            <button class="dashboard-tab" onclick="switchDashboardTab('orders')" style="padding: 10px 20px; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 30px;">الطلبات</button>
            <button class="dashboard-tab" onclick="switchDashboardTab('products')" style="padding: 10px 20px; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 30px;">المنتجات</button>
            <button class="dashboard-tab" onclick="switchDashboardTab('merchants')" style="padding: 10px 20px; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 30px;">التجار</button>
        </div>
        <div id="dashboardContent" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px;"></div>
    </div>

    <!-- الفوتر -->
    <footer class="footer">
        <div class="container">
            <div style="text-align: center; color: rgba(255,255,255,0.7);">
                © 2026 نكهة وجمال | ناردو برو - جميع الحقوق محفوظة
            </div>
        </div>
    </footer>

    <!-- أيقونة السلة الثابتة -->
    <div class="fixed-cart" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="fixed-cart-count" id="fixedCartCounter">0</span>
    </div>

    <!-- نافذة تسجيل الدخول -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2 style="color: #ffd700; text-align: center; margin-bottom: 30px;">تسجيل الدخول</h2>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button onclick="switchAuthTab('login')" style="flex: 1; padding: 10px; background: #ffd700; border: none; border-radius: 25px;">دخول</button>
                <button onclick="switchAuthTab('register')" style="flex: 1; padding: 10px; background: transparent; border: 2px solid #ffd700; color: #ffd700; border-radius: 25px;">تسجيل</button>
            </div>

            <!-- نموذج دخول -->
            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn-gold" style="width: 100%;">دخول</button>
            </form>

            <!-- نموذج تسجيل -->
            <form id="registerForm" style="display: none;" onsubmit="event.preventDefault(); handleRegister();">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="regName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="regEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="regPassword" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="regPhone" class="form-control">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="isMerchant" onchange="toggleMerchantFields()"> تسجيل كتاجر
                    </label>
                </div>
                
                <div id="merchantFields" style="display: none;">
                    <div class="form-group">
                        <label>اسم المتجر</label>
                        <input type="text" id="storeName" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>مستوى التاجر</label>
                        <select id="merchantLevel" class="form-control">
                            <option value="1">المستوى الأول</option>
                            <option value="2" selected>المستوى الثاني</option>
                            <option value="3">المستوى الثالث</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>وصف المتجر</label>
                        <textarea id="merchantDesc" class="form-control" rows="3"></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-gold" style="width: 100%;">تسجيل</button>
            </form>

            <button onclick="closeModal('loginModal')" class="btn-outline" style="width: 100%; margin-top: 15px;">إلغاء</button>
        </div>
    </div>

    <!-- نافذة إضافة منتج -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 style="color: #ffd700; margin-bottom: 20px;">إضافة منتج جديد</h2>
            
            <div class="form-group">
                <label>اسم المنتج</label>
                <input type="text" id="productName" class="form-control" required>
            </div>

            <div class="form-group">
                <label>القسم</label>
                <select id="productCategory" class="form-control" required>
                    <option value="">اختر القسم</option>
                    <option value="promo">برموسيو</option>
                    <option value="spices">توابل</option>
                    <option value="cosmetic">كوسمتيك</option>
                    <option value="other">منتوجات أخرى</option>
                </select>
            </div>

            <div class="form-group">
                <label>السعر (دج)</label>
                <input type="number" id="productPrice" class="form-control" required>
            </div>

            <div class="form-group">
                <label>الكمية</label>
                <input type="number" id="productStock" class="form-control" required>
            </div>

            <div class="form-group">
                <label>صور المنتج</label>
                <div class="upload-area" onclick="document.getElementById('productImages').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اضغط لرفع الصور</p>
                </div>
                <input type="file" id="productImages" accept="image/*" multiple style="display: none;" onchange="handleImageUpload(event)">
                <div class="image-preview" id="imagePreview"></div>
                <div id="uploadStatus" style="display: none; padding: 10px; border-radius: 10px; margin-top: 10px;"></div>
                <input type="hidden" id="productImagesData" value="">
            </div>

            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button onclick="saveProduct()" class="btn-gold" style="flex: 2;">حفظ المنتج</button>
                <button onclick="closeModal('productModal')" class="btn-outline" style="flex: 1;">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة تفاصيل المنتج -->
    <div class="modal" id="productDetailModal">
        <div class="modal-content" id="productDetailContent"></div>
    </div>

            show: function(message, type = 'info', duration = 3000) {
                const container = document.getElementById('toastContainer');
                if (!container) return;
                
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<i class="fas fa-info-circle" style="color: #ffd700; margin-left: 10px;"></i> ${message}`;
                container.appendChild(toast);
                
                setTimeout(() => toast.remove(), duration);
            },
            hideAll: function() {
                document.getElementById('toastContainer').innerHTML = '';
            }
        };

        // ========== استخراج بيانات المنتج ==========
        function extractProductData(text) {
            let productData = {
                name: 'منتج جديد',
                price: 0,
                category: 'other',
                stock: 0,
                merchantName: 'المتجر',
                merchantId: null,
                rating: 4.5
            };
            
            const lines = text.split('\n');
            
            lines.forEach(line => {
                const cleanLine = line.replace(/[🟣*🔵✅❌]/g, '').trim();
                
                if (cleanLine.includes('المنتج:')) {
                    const match = cleanLine.match(/المنتج:\s*([^│]+)/);
                    if (match) productData.name = match[1].trim();
                }
                
                if (cleanLine.includes('السعر:')) {
                    const match = cleanLine.match(/(\d+)/);
                    if (match) productData.price = parseInt(match[1]);
                }
                
                if (cleanLine.includes('القسم:')) {
                    if (cleanLine.includes('برموسيو')) productData.category = 'promo';
                    else if (cleanLine.includes('توابل')) productData.category = 'spices';
                    else if (cleanLine.includes('كوسمتيك')) productData.category = 'cosmetic';
                }
                
                if (cleanLine.includes('الكمية:')) {
                    const match = cleanLine.match(/(\d+)/);
                    if (match) productData.stock = parseInt(match[1]);
                }
                
                if (cleanLine.includes('التاجر:')) {
                    const match = cleanLine.match(/التاجر:\s*([^│]+)/);
                    if (match) productData.merchantName = match[1].trim();
                }
            });
            
            return productData;
        }

        // ========== اسم القسم ==========
        function getCategoryName(category) {
            const names = {
                'promo': 'برموسيو',
                'spices': 'توابل',
                'cosmetic': 'كوسمتيك',
                'other': 'منتوجات أخرى'
            };
            return names[category] || 'أخرى';
        }

        // ========== النجوم ==========
        function generateStars(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5;
            let stars = '';
            for (let i = 0; i < full; i++) stars += '★';
            if (half) stars += '½';
            for (let i = 0; i < 5 - full - (half ? 1 : 0); i++) stars += '☆';
            return stars;
        }

        // ========== الوقت المنقضي ==========
        function getTimeAgo(dateString) {
            if (!dateString) return '';
            const diff = Math.floor((new Date() - new Date(dateString)) / 1000);
            if (diff < 60) return 'الآن';
            if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
            if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
            return `منذ ${Math.floor(diff / 86400)} يوم`;
        }

        // ========== ترتيب المنتجات ==========
        function sortProducts(productsArray) {
            switch(sortBy) {
                case 'newest':
                    return [...productsArray].sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
                case 'price_low':
                    return [...productsArray].sort((a, b) => a.price - b.price);
                case 'price_high':
                    return [...productsArray].sort((a, b) => b.price - a.price);
                default:
                    return productsArray;
            }
        }

        function changeSort(value) {
            sortBy = value;
            displayProducts();
        }

        // ========== دوال تلجرام ==========
        async function sendTelegramMessage(message, chatId = TELEGRAM.channelId) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'Markdown' })
                });
                return (await response.json()).ok;
            } catch {
                return false;
            }
        }

        async function sendTelegramPhoto(imageUrl, caption, chatId = TELEGRAM.channelId) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, photo: imageUrl, caption, parse_mode: 'Markdown' })
                });
                return (await response.json()).ok;
            } catch {
                return false;
            }
        }

        async function uploadImageToTelegram(imageFile) {
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('photo', imageFile);

                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.ok && data.result.photo) {
                    const fileId = data.result.photo[data.result.photo.length - 1].file_id;
                    const fileResponse = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                    const fileData = await fileResponse.json();
                    
                    if (fileData.ok) {
                        return `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                    }
                }
                return null;
            } catch {
                return null;
            }
        }

        async function getTelegramUpdates() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getUpdates?offset=${lastUpdateId}`);
                const data = await response.json();
                if (data.ok && data.result) {
                    data.result.forEach(u => lastUpdateId = u.update_id + 1);
                    return data.result;
                }
                return [];
            } catch {
                return [];
            }
        }

        // ========== جلب المنتجات من تلجرام ==========
        async function fetchProductsFromTelegram() {
            try {
                const updates = await getTelegramUpdates();
                const foundProducts = [];
                
                for (const update of updates) {
                    if (update.channel_post) {
                        const post = update.channel_post;
                        const text = post.caption || post.text || '';
                        
                        if (text.includes('🟣') || text.includes('منتج')) {
                            const productData = extractProductData(text);
                            
                            let imageUrl = "https://via.placeholder.com/300/2c5e4f/ffffff?text=نكهة+وجمال";
                            
                            if (post.photo?.length > 0) {
                                try {
                                    const photo = post.photo[post.photo.length - 1];
                                    const fileResponse = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getFile?file_id=${photo.file_id}`);
                                    const fileData = await fileResponse.json();
                                    if (fileData.ok) {
                                        imageUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                                    }
                                } catch {}
                            }
                            
                            foundProducts.push({
                                id: post.message_id,
                                name: productData.name,
                                price: productData.price,
                                category: productData.category,
                                stock: productData.stock,
                                merchantName: productData.merchantName,
                                merchantId: productData.merchantId,
                                images: [imageUrl],
                                rating: 4.5,
                                createdAt: new Date(post.date * 1000).toISOString()
                            });
                        }
                    }
                }
                
                return foundProducts;
            } catch {
                return [];
            }
        }

        // ========== دمج المنتجات ==========
        function mergeProducts(telegramProducts) {
            const localProducts = JSON.parse(localStorage.getItem('nardoo_products') || '[]');
            const allProducts = [...telegramProducts];
            
            localProducts.forEach(localProduct => {
                if (!allProducts.find(p => p.id === localProduct.id)) {
                    allProducts.push(localProduct);
                }
            });
            
            localStorage.setItem('nardoo_products', JSON.stringify(allProducts));
            return allProducts;
        }

        // ========== تحميل المنتجات ==========
        async function loadProducts() {
            ToastSystem.show('جاري تحميل المنتجات...', 'info');
            const telegramProducts = await fetchProductsFromTelegram();
            products = mergeProducts(telegramProducts);
            displayProducts();
        }

        // ========== إضافة منتج إلى تلجرام ==========
        async function addProductToTelegram(product) {
            try {
                ToastSystem.show('جاري النشر إلى تلجرام...', 'info');
                
                const message = `
🟣 *منتج جديد*
━━━━━━━━━━━━━━
📦 *المنتج:* ${product.name}
💰 *السعر:* ${product.price} دج
🏷️ *القسم:* ${getCategoryName(product.category)}
📊 *الكمية:* ${product.stock} قطعة
👤 *التاجر:* ${product.merchantName}
                `;

                if (product.images?.length > 0 && !product.images[0].includes('placeholder')) {
                    const success = await sendTelegramPhoto(product.images[0], message);
                    if (success) {
                        ToastSystem.show('تم النشر مع الصورة', 'success');
                        return true;
                    }
                }
                
                const success = await sendTelegramMessage(message);
                if (success) {
                    ToastSystem.show('تم النشر', 'success');
                    return true;
                }
                
                ToastSystem.show('فشل النشر', 'error');
                return false;
            } catch {
                ToastSystem.show('خطأ في الاتصال', 'error');
                return false;
            }
        }

        // ========== رفع الصور ==========
        async function handleImageUpload(event) {
            const files = event.target.files;
            const preview = document.getElementById('imagePreview');
            const uploadStatus = document.getElementById('uploadStatus');
            const imagesData = [];

            preview.innerHTML = '';
            uploadStatus.style.display = 'block';
            uploadStatus.style.background = '#2196f3';
            uploadStatus.innerText = 'جاري رفع الصور...';

            for (const file of files) {
                const reader = new FileReader();
                reader.onload = e => {
                    preview.innerHTML += `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(file);
                
                const imageUrl = await uploadImageToTelegram(file);
                if (imageUrl) imagesData.push(imageUrl);
            }

            document.getElementById('productImagesData').value = JSON.stringify(imagesData);
            
            uploadStatus.style.background = '#4caf50';
            uploadStatus.innerText = `تم رفع ${imagesData.length} صورة`;
            setTimeout(() => uploadStatus.style.display = 'none', 3000);
        }

        // ========== عرض المنتجات ==========

                    <div style="grid-column: 1/-1; text-align: center; padding: 80px 20px;">

                         onerror="this.src='https://via.placeholder.com/300/2c5e4f/ffffff?text=نكهة+وجمال'">
                    <div class="product-info">
                        <div style="color: #ffd700; margin-bottom: 5px;">
                            <i class="fas ${product.category === 'promo' ? 'fa-fire' : product.category === 'spices' ? 'fa-mortar-pestle' : product.category === 'cosmetic' ? 'fa-spa' : 'fa-tag'}"></i>

        // ========== فلترة ==========
        function filterProducts(category) {
            currentFilter = category;
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('active');
                el.style.background = 'transparent';
                el.style.color = 'white';
            });
            if (event?.target) {
                event.target.classList.add('active');
                event.target.style.background = '#ffd700';
                event.target.style.color = '#1a2f28';
            }
            displayProducts();

        // ========== بحث ==========
        function searchProducts() {
            searchTerm = document.getElementById('searchInput').value;
            displayProducts();
        }

        // ========== سلة التسوق ==========
        function loadCart() {
            cart = JSON.parse(localStorage.getItem('nardoo_cart') || '[]');
            updateCartCounter();
        }

        function saveCart() {
            localStorage.setItem('nardoo_cart', JSON.stringify(cart));
        }

        function updateCartCounter() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCounter').textContent = count;
            document.getElementById('fixedCartCounter').textContent = count;
        }

        function addToCart(productId) {
            const product = products.find(p => p.id == productId);
            if (!product || product.stock <= 0) {
                ToastSystem.show('المنتج غير متوفر', 'error');
                return;
            }

            const existing = cart.find(item => item.productId == productId);
            if (existing) {
                if (existing.quantity < product.stock) {
                    existing.quantity++;
                } else {
                    ToastSystem.show('الكمية غير كافية', 'warning');
                    return;
                }
            } else {
                cart.push({ productId, name: product.name, price: product.price, quantity: 1, merchantName: product.merchantName });
            }

            saveCart();
            updateCartCounter();
            updateCartDisplay();
            ToastSystem.show('تمت الإضافة', 'success');
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const itemsDiv = document.getElementById('cartItems');
            const totalSpan = document.getElementById('cartTotal');

            if (!cart.length) {
                itemsDiv.innerHTML = '<div style="text-align: center; padding: 40px;">السلة فارغة</div>';
                totalSpan.textContent = '0 دج';
                return;
            }

            let total = 0;
            itemsDiv.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div style="background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px;">
                        <div style="font-weight: bold;">${item.name}</div>
                        <div style="color: #ffd700;">${item.price} دج</div>
                        <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                            <button onclick="updateCartItem(${item.productId}, ${item.quantity - 1})" style="width: 30px; height: 30px; background: transparent; border: 1px solid #ffd700; color: #ffd700; border-radius: 5px;">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateCartItem(${item.productId}, ${item.quantity + 1})" style="width: 30px; height: 30px; background: transparent; border: 1px solid #ffd700; color: #ffd700; border-radius: 5px;">+</button>
                            <button onclick="removeFromCart(${item.productId})" style="width: 30px; height: 30px; background: #f44336; border: none; color: white; border-radius: 5px;">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');

            totalSpan.textContent = `${total} دج`;
        }

        function updateCartItem(productId, newQuantity) {
            const item = cart.find(i => i.productId == productId);
            const product = products.find(p => p.id == productId);

            if (!item || !product) return;

            if (newQuantity <= 0) {
                removeFromCart(productId);
                return;
            }

            if (newQuantity > product.stock) {
                ToastSystem.show('الكمية غير متوفرة', 'warning');
                return;
            }

            item.quantity = newQuantity;
            saveCart();
            updateCartCounter();
            updateCartDisplay();
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.productId != productId);
            saveCart();
            updateCartCounter();
            updateCartDisplay();
            ToastSystem.show('تمت الإزالة', 'info');
        }

        // ========== إتمام الشراء ==========
        async function checkoutCart() {
            if (!cart.length) {
                ToastSystem.show('السلة فارغة', 'warning');
                return;
            }

            if (!currentUser) {
                ToastSystem.show('سجل دخول أولاً', 'warning');
                openLoginModal();
                return;
            }

            const phone = prompt('رقم الهاتف:', currentUser.phone || '');
            if (!phone) return;
            
            const address = prompt('العنوان:', '');
            if (!address) return;

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal + 800;

            const order = {
                customerName: currentUser.name,
                customerPhone: phone,
                customerAddress: address,
                items: [...cart],
                total,
                orderId: `ORD${Date.now()}`
            };

            ToastSystem.show('جاري إرسال الطلب...', 'info');
            
            // إرسال إلى تلجرام
            const productsList = cart.map(item => `• ${item.name} - ${item.quantity} قطعة - ${item.price * item.quantity} دج`).join('\n');
            await sendTelegramMessage(`
🟢 *طلب جديد*
👤 ${currentUser.name}
📞 ${phone}
📍 ${address}
📦 ${productsList}
💰 الإجمالي: ${total} دج
            `);

            // واتساب
            cart.forEach(item => {
                window.open(`https://wa.me/213562243648?text=${encodeURIComponent(`طلب: ${item.name} - ${item.quantity} قطعة`)}`, '_blank');
            });

            // تحديث المخزون
            cart.forEach(item => {
                const product = products.find(p => p.id == item.productId);
                if (product) product.stock -= item.quantity;
            });

            cart = [];
            saveCart();
            updateCartCounter();
            toggleCart();
            ToastSystem.show('تم إرسال الطلب', 'success');
        }

        // ========== إدارة المستخدمين ==========
        function openLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function switchAuthTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        function toggleMerchantFields() {
            document.getElementById('merchantFields').style.display = 
                document.getElementById('isMerchant').checked ? 'block' : 'none';
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const user = users.find(u => (u.email === email || u.name === email) && u.password === password);

            if (user) {
                currentUser = user;
                localStorage.setItem('current_user', JSON.stringify(user));
                closeModal('loginModal');
                updateUIBasedOnRole();
                ToastSystem.show(`مرحباً ${user.name}`, 'success');
            } else {
                ToastSystem.show('بيانات غير صحيحة', 'error');
            }
        }

        function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const phone = document.getElementById('regPhone').value;
            const isMerchant = document.getElementById('isMerchant').checked;

            if (!name || !email || !password) {
                ToastSystem.show('املأ جميع الحقول', 'error');
                return;
            }

            if (users.find(u => u.email === email)) {
                ToastSystem.show('البريد مستخدم', 'error');
                return;
            }

            const newUser = {
                id: users.length + 1,
                name, email, password, phone,
                role: isMerchant ? 'merchant_pending' : 'customer',
                createdAt: new Date().toISOString()
            };

            if (isMerchant) {
                newUser.storeName = document.getElementById('storeName').value || `متجر ${name}`;
                sendMerchantRequestToTelegram(newUser);
                ToastSystem.show('تم إرسال الطلب', 'info');
            }

            users.push(newUser);
            localStorage.setItem('nardoo_users', JSON.stringify(users));
            switchAuthTab('login');
        }

        async function sendMerchantRequestToTelegram(merchant) {
            await sendTelegramMessage(`
🔵 *طلب تاجر جديد*
🏪 ${merchant.storeName}
👤 ${merchant.name}
📧 ${merchant.email}
✅ للموافقة: /approve_${merchant.id}
❌ للرفض: /reject_${merchant.id}
            `);
        }

        async function approveMerchant(merchantId) {
            const merchant = users.find(u => u.id == merchantId);
            if (!merchant) return;
            
            merchant.role = 'merchant_approved';
            localStorage.setItem('nardoo_users', JSON.stringify(users));
            await sendTelegramMessage(`✅ تمت الموافقة على ${merchant.name}`);
            ToastSystem.show('تمت الموافقة', 'success');
        }

        function updateUIBasedOnRole() {
            if (!currentUser) return;

            if (currentUser.role === 'admin') {
                document.getElementById('dashboardBtn').style.display = 'flex';
                document.getElementById('userBtn').innerHTML = '<i class="fas fa-crown"></i>';
            } else if (currentUser.role === 'merchant_approved') {
                document.getElementById('dashboardBtn').style.display = 'none';
                document.getElementById('userBtn').innerHTML = '<i class="fas fa-store"></i>';
                showMerchantPanel();
            }
        }

        function showMerchantPanel() {
            if (!currentUser || currentUser.role !== 'merchant_approved') return;
            
            const merchantProducts = products.filter(p => p.merchantName === currentUser.storeName || p.merchantName === currentUser.name);
            
            document.getElementById('merchantPanelContainer').innerHTML = `
                <div style="background: linear-gradient(135deg, #9b59b6, #8e44ad); border-radius: 30px; padding: 30px; margin: 20px 0; border: 2px solid #ffd700;">
                    <h3 style="color: white;"><i class="fas fa-store"></i> ${currentUser.storeName || currentUser.name}</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0;">
                        <div style="background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center;">
                            <div style="font-size: 32px; color: #ffd700;">${merchantProducts.length}</div>
                            <div>منتجاتك</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center;">
                            <div style="font-size: 32px; color: #ffd700;">${merchantProducts.filter(p => p.stock > 0).length}</div>
                            <div>متاح</div>
                        </div>
                    </div>
                    <button class="btn-gold" onclick="showAddProductModal()" style="width: 100%;">➕ إضافة منتج</button>
                </div>
            `;
            document.getElementById('merchantPanelContainer').style.display = 'block';
        }

        // ========== إضافة منتج ==========
        function showAddProductModal() {
            if (!currentUser || (currentUser.role !== 'merchant_approved' && currentUser.role !== 'admin')) {
                ToastSystem.show('غير مصرح', 'error');
                return;
            }
            document.getElementById('productModal').style.display = 'flex';
        }

        async function saveProduct() {
            if (!currentUser) return;

            const product = {
                id: Date.now(),
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                price: parseInt(document.getElementById('productPrice').value),
                stock: parseInt(document.getElementById('productStock').value),
                merchantName: currentUser.storeName || currentUser.name,
                merchantId: currentUser.id,
                images: JSON.parse(document.getElementById('productImagesData').value || '[]'),
                rating: 4.5,
                createdAt: new Date().toISOString()
            };

            if (!product.name || !product.category || !product.price || !product.stock) {
                ToastSystem.show('املأ جميع الحقول', 'error');
                return;
            }

            const localProducts = JSON.parse(localStorage.getItem('nardoo_products') || '[]');
            localProducts.push(product);
            localStorage.setItem('nardoo_products', JSON.stringify(localProducts));
            products = localProducts;

            await addProductToTelegram(product);

            closeModal('productModal');
            displayProducts();
            if (currentUser.role === 'merchant_approved') showMerchantPanel();
        }

        // ========== لوحة التحكم ==========
        function openDashboard() {
            if (!currentUser || currentUser.role !== 'admin') {
                ToastSystem.show('غير مصرح', 'error');
                return;
            }
            document.getElementById('dashboardSection').style.display = 'block';
            switchDashboardTab('overview');
        }

        function switchDashboardTab(tab) {
            const pending = users.filter(u => u.role === 'merchant_pending');
            const approved = users.filter(u => u.role === 'merchant_approved');

            if (tab === 'overview') {
                document.getElementById('dashboardContent').innerHTML = `
                    <h3 style="color: #ffd700; margin-bottom: 20px;">نظرة عامة</h3>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center;">
                            <div style="font-size: 32px; color: #ffd700;">${products.length}</div>
                            <div>المنتجات</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center;">
                            <div style="font-size: 32px; color: #ffd700;">${users.length}</div>
                            <div>المستخدمين</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center;">
                            <div style="font-size: 32px; color: #ffd700;">${approved.length}</div>
                            <div>التجار</div>
                        </div>
                    </div>
                `;
            } else if (tab === 'merchants') {
                document.getElementById('dashboardContent').innerHTML = `
                    <h3 style="color: #ffd700; margin-bottom: 20px;">طلبات التجار (${pending.length})</h3>
                    ${pending.map(m => `
                        <div style="background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-right: 5px solid #ffd700;">
                            <h4>${m.storeName || m.name}</h4>
                            <p>👤 ${m.name} | 📧 ${m.email}</p>
                            <button onclick="approveMerchant(${m.id})" style="background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 25px;">موافقة</button>
                        </div>
                    `).join('') || '<p>لا توجد طلبات</p>'}
                `;
            }
        }

        // ========== دوال مساعدة ==========
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
        }

        // ========== التهيئة ==========
        window.onload = async function() {
            await loadProducts();
            loadCart();

            const savedUser = localStorage.getItem('current_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                updateUIBasedOnRole();
            }

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);

            window.addEventListener('scroll', () => {
                const winScroll = document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - window.innerHeight;
                document.querySelector('.scroll-progress')?.style.setProperty('width', (winScroll / height * 100) + '%');
            });

            setInterval(loadProducts, 30000);
        };

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };
    </script>
</body>
</html>
