<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نكهة وجمال | ناردو برو</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a1a15;
            color: white;
            min-height: 100vh;
        }
        .container { width: 95%; max-width: 1400px; margin: 0 auto; padding: 0 15px; }
        .top-bar {
            background: #1a2f28;
            padding: 15px 0;
            border-bottom: 2px solid #d4af37;
        }
        .top-bar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .top-bar-item i { color: #d4af37; margin-left: 8px; }
        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid #d4af37;
            border-radius: 50px;
            padding: 5px 15px;
            cursor: pointer;
        }
        .header {
            background: rgba(26,47,40,0.95);
            padding: 20px 0;
            margin-bottom: 20px;
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: #d4af37;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-5deg);
        }
        .logo-icon i { font-size: 30px; color: #0a1a15; }
        .logo-text h1 {
            font-size: 28px;
            color: #d4af37;
        }
        .search-box {
            display: flex;
            background: rgba(255,255,255,0.1);
            border: 2px solid #d4af37;
            border-radius: 50px;
            overflow: hidden;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: white;
            font-family: 'Cairo', sans-serif;
            outline: none;
        }
        .search-box button {
            width: 50px;
            background: #d4af37;
            border: none;
            color: #0a1a15;
            cursor: pointer;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid #d4af37;
            color: #d4af37;
            cursor: pointer;
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #d4af37;
            color: #0a1a15;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-menu {
            background: linear-gradient(135deg, #1a2f28, #0a1a15);
            border: 2px solid #d4af37;
            border-radius: 60px;
            padding: 10px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        .nav-link {
            padding: 10px 25px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link:hover, .nav-link.active {
            background: #d4af37;
            color: #0a1a15;
        }
        .nav-link i { color: #d4af37; }
        .nav-link:hover i { color: #0a1a15; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin: 30px 0;
        }
        @media (max-width: 992px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 576px) { .products-grid { grid-template-columns: 1fr; } }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a2f28;
            border: 2px solid #d4af37;
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #d4af37;
            border-radius: 15px;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #b38f2c);
            color: #0a1a15;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .footer {
            background: #1a2f28;
            padding: 40px 0;
            margin-top: 50px;
            border-top: 2px solid #d4af37;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-item"><i class="fas fa-truck"></i> شحن مجاني للطلبات فوق 5000 دج</div>
            <div class="top-bar-item"><i class="fas fa-gem"></i> منتجات أصلية 100%</div>
            <div class="top-bar-item"><i class="fas fa-headset"></i> VIP 24/7</div>
            <div class="theme-toggle" onclick="toggleTheme()" id="themeToggle"><i class="fas fa-moon"></i> ليلي</div>
        </div>
    </div>

    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-leaf"></i></div>
                <div class="logo-text"><h1>نكهة وجمال</h1></div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج..." onkeyup="searchProducts()">
                <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="openLoginModal()" id="userBtn"><i class="far fa-user"></i></button>
                <button class="action-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCounter">0</span>
                </button>
                <button class="action-btn" id="dashboardBtn" style="display:none;" onclick="openDashboard()"><i class="fas fa-chart-line"></i></button>
            </div>
        </div>
    </header>

    <div class="container">
        <nav class="nav-menu" id="mainNav">
            <a class="nav-link active" onclick="filterProducts('all')"><i class="fas fa-home"></i> الرئيسية</a>
            <a class="nav-link" onclick="filterProducts('promo')"><i class="fas fa-fire"></i> برموسيو</a>
            <a class="nav-link" onclick="filterProducts('spices')"><i class="fas fa-mortar-pestle"></i> توابل</a>
            <a class="nav-link" onclick="filterProducts('cosmetic')"><i class="fas fa-spa"></i> كوسمتيك</a>
            <a class="nav-link" onclick="filterProducts('other')"><i class="fas fa-gem"></i> منتوجات أخرى</a>
        </nav>
    </div>

    <div class="container">
        <div class="products-grid" id="productsContainer"></div>
    </div>

    <div class="container" id="merchantPanel" style="display:none;"></div>

    <div class="container" id="dashboardSection" style="display:none;"></div>

    <footer class="footer">
        <div class="container">
            <div style="text-align: center; color: #d4af37;">
                © 2026 نكهة وجمال | ناردو برو - جميع الحقوق محفوظة
            </div>
        </div>
    </footer>

    <!-- نوافذ منبثقة -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2 style="color:#d4af37; text-align:center; margin-bottom:20px;">تسجيل الدخول</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-gold" style="flex:1;" onclick="switchAuthTab('login')">دخول</button>
                <button class="btn-outline" style="flex:1;" onclick="switchAuthTab('register')">تسجيل</button>
            </div>
            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" class="form-control" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-gold" style="width:100%;">دخول</button>
            </form>
            <form id="registerForm" style="display:none;" onsubmit="event.preventDefault(); handleRegister();">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" class="form-control" id="regName" required>
                </div>
                <div class="form-group">
                    <label>البريد</label>
                    <input type="email" class="form-control" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label style="display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" id="isMerchant" onchange="toggleMerchantFields()">
                        <span>تسجيل كتاجر</span>
                    </label>
                </div>
                <div id="merchantFields" style="display:none;">
                    <div class="form-group">
                        <label>اسم المتجر</label>
                        <input type="text" class="form-control" id="storeName">
                    </div>
                </div>
                <button type="submit" class="btn-gold" style="width:100%;">تسجيل</button>
            </form>
        </div>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 style="color:#d4af37; text-align:center; margin-bottom:20px;">إضافة منتج</h2>
            <form id="productForm">
                <div class="form-group">
                    <label>اسم المنتج</label>
                    <input type="text" class="form-control" id="productName" required>
                </div>
                <div class="form-group">
                    <label>القسم</label>
                    <select class="form-control" id="productCategory">
                        <option value="promo">برموسيو</option>
                        <option value="spices">توابل</option>
                        <option value="cosmetic">كوسمتيك</option>
                        <option value="other">أخرى</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>السعر (دج)</label>
                    <input type="number" class="form-control" id="productPrice" required>
                </div>
                <div class="form-group">
                    <label>الكمية</label>
                    <input type="number" class="form-control" id="productStock" required>
                </div>
                <div class="form-group">
                    <label>رابط الصورة</label>
                    <input type="url" class="form-control" id="productImage" placeholder="https://example.com/image.jpg">
                </div>
                <button type="button" class="btn-gold" style="width:100%;" onclick="saveProduct()">حفظ المنتج</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
